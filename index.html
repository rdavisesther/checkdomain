<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DKIM / SPF / DMARC Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
    }

    .box {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    pre {
      background: #0b0b0b;
      color: #00ff66;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>DKIM / SPF / DMARC Checker</h1>

    <input type="text" id="domain" placeholder="Enter domain, e.g. google.com" />
    <input type="text" id="ip" placeholder="Optional IP, e.g. 1.2.3.4" />
    <button id="checkBtn">Check</button>

    <pre id="output">Results will appear here...</pre>
  </div>

  <script>
    document.getElementById("checkBtn").addEventListener("click", checkDomain);

    async function checkDomain() {
      const domain = document.getElementById("domain").value.trim();
      const ip = document.getElementById("ip").value.trim();
      const output = document.getElementById("output");

      if (!domain) {
        output.textContent = "Please enter a domain.";
        return;
      }

      output.textContent = "Checking...";

      try {
        const params = new URLSearchParams();
        params.set("domain", domain);
        if (ip) params.set("ip", ip);

        const res = await fetch(`/api/check?${params.toString()}`);

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          output.textContent =
            "Server did not return valid JSON.\n\n" +
            "Response was:\n" +
            text;
          return;
        }

        if (!res.ok) {
          output.textContent = "Error:\n" + JSON.stringify(data, null, 2);
          return;
        }

        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = "Request failed: " + err.message;
      }
    }
  </script>
</body>
</html>
